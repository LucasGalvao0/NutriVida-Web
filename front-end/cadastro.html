<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" href="img/logos/logo.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --secondary: #34d399;
            --accent: #fbbf24;
            --orange: #fb923c;
            --dark: #0a1f1a;
            --dark-light: #1e293b;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a1f1a 0%, #0f172a 50%, #1a1f0a 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        /* Background Elements */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            filter: blur(80px);
            opacity: 0.2;
            animation: blobMove 25s ease-in-out infinite;
        }

        .blob1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #10b981 0%, transparent 70%);
            top: -10%;
            left: -10%;
        }

        .blob2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #fbbf24 0%, transparent 70%);
            bottom: -10%;
            right: -10%;
            animation-delay: 5s;
        }

        @keyframes blobMove {
            0%, 100% { 
                transform: translate(0, 0) scale(1);
                opacity: 0.2;
            }
            50% { 
                transform: translate(30px, -30px) scale(1.1);
                opacity: 0.3;
            }
        }

        .grid-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(16, 185, 129, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(16, 185, 129, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* Back Button */
        .botaoVoltarIndex {
            position: fixed;
            top: 2rem;
            left: 2rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(16, 185, 129, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 1000;
            text-decoration: none;
        }

        .botaoVoltarIndex:hover {
            background: rgba(16, 185, 129, 0.2);
            border-color: var(--primary);
            transform: translateX(-5px);
        }

        .botaoVoltarIndex img {
            width: 24px;
            height: 24px;
            filter: invert(0.7) sepia(1) saturate(5) hue-rotate(100deg);
        }

        /* Main Container */
        .cadastro {
            display: grid;
            grid-template-columns: 1fr 1fr;
            max-width: 1200px;
            width: 100%;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.95), rgba(30, 41, 59, 0.95));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.4);
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Form Side */
        .ladoForm {
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logoform {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 0.3rem;
            margin-bottom: 2.5rem;
        }

        .logoform h1{
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logoform img {
            width: 5rem;
            height: auto;
            filter: drop-shadow(0 4px 12px rgba(16, 185, 129, 0.3));
        }

        .titulo2 {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
        }

        /* Form Elements */
        .formulario {
            display: flex;
            flex-direction: column;
        }

        .formulario label {
            display: block;
            color: var(--text);
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.6rem;
            margin-top: 1rem;
        }

        .formulario label:first-of-type {
            margin-top: 0;
        }

        .formulario input {
            width: 100%;
            padding: 1rem 1.3rem;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(16, 185, 129, 0.2);
            border-radius: 14px;
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
        }

        .formulario input::placeholder {
            color: var(--text-dim);
            opacity: 0.6;
        }

        .formulario input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .formulario input.error {
            border-color: #ef4444;
        }

        .mErro {
            display: none;
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 0.4rem;
        }

        .mErro.show {
            display: block;
        }

        /* Buttons */
        .botoesCadastro {
            margin-top: 1.5rem;
        }

        .botao1 {
            width: 100%;
            padding: 1.2rem;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
            position: relative;
            overflow: hidden;
        }

        .botao1::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .botao1:hover::before {
            width: 500px;
            height: 500px;
        }

        .botao1:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(16, 185, 129, 0.5);
        }

        .P4 {
            text-align: center;
            margin: 1.2rem 0;
            color: var(--text-dim);
            font-size: 0.9rem;
            position: relative;
        }

        .P4::before,
        .P4::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: rgba(16, 185, 129, 0.2);
        }

        .P4::before {
            left: 0;
        }

        .P4::after {
            right: 0;
        }

        .botao2 {
            width: 100%;
            padding: 1rem;
            border: 2px solid rgba(16, 185, 129, 0.3);
            border-radius: 14px;
            background: rgba(15, 23, 42, 0.6);
            color: var(--text);
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            text-decoration: none;
        }

        .botao2:hover {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .P1 {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        .P1 a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .P1 a:hover {
            color: var(--secondary);
        }

        /* Image Side */
        .ladoImagemCadastro {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(52, 211, 153, 0.1));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            position: relative;
            overflow: hidden;
        }

        .ladoImagemCadastro::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .paiImg {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .paiImg img {
            width: 100%;
            max-width: 450px;
            height: auto;
            filter: drop-shadow(0 20px 40px rgba(16, 185, 129, 0.3));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-15px) scale(1.02); }
        }

        /* Toast Message */
        .mensagem {
            position: fixed;
            top: 2rem;
            right: 2rem;
            padding: 1.2rem 2rem;
            border-radius: 14px;
            font-weight: 600;
            z-index: 10001;
            opacity: 0;
            transform: translateX(500px);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .mensagem.show {
            opacity: 1;
            transform: translateX(0);
        }

        .mensagem.sucesso {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .mensagem.erro {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        /* Responsive */
        @media (max-width: 968px) {
            .cadastro {
                grid-template-columns: 1fr;
            }

            .ladoImagemCadastro {
                display: none;
            }

            .ladoForm {
                padding: 3rem 2rem;
            }
        }

        @media (max-width: 480px) {
            .ladoForm {
                padding: 2rem 1.5rem;
            }

            .botaoVoltarIndex {
                top: 1rem;
                left: 1rem;
            }
        }
    </style>
<body>
    <div class="organic-bg-nutrivida">
        <div class="blob-nutrivida blob-nutrivida-1"></div>
        <div class="blob-nutrivida blob-nutrivida-2"></div>
        <div class="blob-nutrivida blob-nutrivida-3"></div>
        <div class="blob-nutrivida blob-nutrivida-4"></div>
    </div>

    <div class="floating-foods-nutrivida">
        <div class="food-icon-nutrivida food-nutrivida-1">
            <img src="img/abacate.png" alt="abacate-imagem">
        </div>
        <div class="food-icon-nutrivida food-nutrivida-2">
            <img src="img/maca.png" alt="maça imagem">
        </div>
        <div class="food-icon-nutrivida food-nutrivida-3">
            <img src="img/salada.png" alt="salada imagem">
        </div>
        <div class="food-icon-nutrivida food-nutrivida-4">
            <img src="img/tangerina.png" alt="tangerina imagem">
        </div>
        <div class="food-icon-nutrivida food-nutrivida-5">
            <img src="img/brocolis.png" alt="brocolis imagem">
        </div>
        <div class="food-icon-nutrivida food-nutrivida-6">
            <img src="img/banana.png" alt="banana imagem">
        </div>
        <div class="food-icon-nutrivida food-nutrivida-7">
            <img src="img/cenoura.png" alt="imagem cenoura">
        </div>
        <div class="food-icon-nutrivida food-nutrivida-8">
            <img src="img/kiwi.png" alt="imagem kiwi">
        </div>
    </div>
    
    <main class="cadastro">
        <!-- Form Side -->
        <section class="ladoForm">
            <form class="formulario" action="" method="post" id="formCadastro">
                <div class="logoform">
                    <img src="img/logos/logo.png" alt="logo-Nutrivida">
                <h1>Nutrivida</h1>
                </div>

                <h1 class="titulo2">Cadastre-se</h1>

                <label for="nomes">Digite seu nome completo</label>
                <input type="text" id="nomes" name="nomes" placeholder="Digite seu nome">
                <span class="mErro" id="usernameError"></span>

                <label for="email">Digite seu e-mail</label>
                <input type="email" id="email" name="email" placeholder="Digite seu e-mail">
                <span class="mErro" id="emailError"></span>

                <label for="senha">Digite sua senha</label>
                <input type="password" id="senha" name="senha" placeholder="Digite sua senha">
                <span class="mErro" id="passwordError"></span>

                <div class="botoesCadastro">
                    <button class="botao1" id="btnCadastro" type="submit">Cadastrar</button>
                    <p class="P4">ou</p>
                    <a class="botao2" href="http://localhost:3000/auth/google?prompt=login"><svg width="20" height="20" viewBox="0 0 20 20">
                        <path fill="#4285F4" d="M19.6 10.23c0-.82-.1-1.42-.25-2.05H10v3.72h5.5c-.15.96-.74 2.31-2.04 3.22v2.45h3.16c1.89-1.73 2.98-4.3 2.98-7.34z"/>
                        <path fill="#34A853" d="M13.46 15.13c-.83.59-1.96 1-3.46 1-2.64 0-4.88-1.74-5.68-4.15H1.07v2.52C2.72 17.75 6.09 20 10 20c2.7 0 4.96-.89 6.62-2.42l-3.16-2.45z"/>
                        <path fill="#FBBC05" d="M3.99 10c0-.69.12-1.35.32-1.97V5.51H1.07A9.973 9.973 0 000 10c0 1.61.39 3.14 1.07 4.49l3.24-2.52c-.2-.62-.32-1.28-.32-1.97z"/>
                        <path fill="#EA4335" d="M10 3.88c1.88 0 3.13.81 3.85 1.48l2.84-2.76C14.96.99 12.7 0 10 0 6.09 0 2.72 2.25 1.07 5.51l3.24 2.52C5.12 5.62 7.36 3.88 10 3.88z"/>
                    </svg> Login com Google
                        
                    </a>
                    <p class="P1">Já possui uma conta? <a href="entrar.html">Faça login</a></p>
                </div>
            </form>
        </section>

        <!-- Image Side -->
        <section class="ladoImagemCadastro">
            <div class="paiImg">
                <img src="img/imgForm2.png" alt="Imagem-comida">
            </div>
        </section>
    </main>

    
       
<div id="mensagem-flutuante" class="mensagem"></div>



</body>
</html>
