<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histórico de Cardápios - NutriVida</title>
  <link rel="icon" href="img/logos/logo.png" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="tela.js" defer></script>
  <style>
    :root {
      --primary: #10b981;
      --primary-dark: #059669;
      --secondary: #34d399;
      --accent: #fbbf24;
      --blue: #3b82f6;
      --orange: #fb923c;
      --dark: #0f172a;
      --dark-light: #1e293b;
      --card-bg: rgba(15, 23, 42, 0.92);
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --border: rgba(16, 185, 129, 0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a1f1a 0%, #0f172a 100%);
      min-height: 100vh;
      color: var(--text);
      overflow-x: hidden;
    }

    .bg-blobs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .blob { position: absolute; border-radius: 50%; filter: blur(90px); opacity: .1; }
    .blob-1 { width: 520px; height: 520px; background: var(--primary); top: -140px; left: -120px; animation: drift 14s ease-in-out infinite alternate; }
    .blob-2 { width: 420px; height: 420px; background: var(--blue); bottom: -100px; right: -100px; animation: drift 18s ease-in-out infinite alternate-reverse; }
    .blob-3 { width: 280px; height: 280px; background: var(--accent); top: 45%; left: 55%; animation: drift 11s ease-in-out infinite alternate; }
    @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(28px,18px) scale(1.04); } }

    
    .page { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 32px 20px 60px; }

    .section-title {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; font-weight: 700; color: #4b5563;
      letter-spacing: .9px; text-transform: uppercase;
      margin-bottom: 18px;
    }
    .section-title::before, .section-title::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,.07);
    }

    /* ─── SELETOR DE CARDÁPIOS ─── */
    .plan-selector-section {
      margin-bottom: 36px;
      animation: fadeUp .4s ease both;
      margin-top: 6rem;
    }

    .plan-selector-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
    }
    .plan-selector-header h2 {
      font-size: 16px; font-weight: 800; color: #fff;
      display: flex; align-items: center; gap: 8px;
    }
    .plan-count-badge {
      font-size: 11px; font-weight: 700;
      background: rgba(16,185,129,.15);
      border: 1px solid rgba(16,185,129,.3);
      color: var(--primary);
      border-radius: 20px; padding: 3px 10px;
    }

    .plan-cards-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
      gap: 12px;
    }

    .plan-card {
      position: relative;
      background: var(--card-bg);
      border: 1.5px solid rgba(255,255,255,.08);
      border-radius: 18px;
      padding: 18px 18px 16px;
      cursor: pointer;
      transition: border-color .22s, transform .2s, box-shadow .2s;
      overflow: hidden;
    }
    .plan-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 60%, rgba(16,185,129,.06));
      pointer-events: none;
    }
    .plan-card:hover {
      border-color: rgba(16,185,129,.4);
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0,0,0,.3);
    }
    .plan-card.active {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(16,185,129,.18), 0 10px 30px rgba(0,0,0,.3);
      background: rgba(16,185,129,.07);
    }
    .plan-card.active .plan-check {
      display: flex !important;
    }
    .plan-check {
      display: none;
      position: absolute; top: 12px; right: 14px;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--primary);
      align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .plan-check svg { display: block; }

    .plan-emoji {
      width: 40px; height: 40px; margin-bottom: 12px; display: flex;
      align-items: center; justify-content: center;
      background: rgba(16,185,129,.12);
      border: 1px solid rgba(16,185,129,.2);
      border-radius: 12px;
      color: var(--primary);
      flex-shrink: 0;
    }
    .plan-emoji svg { width: 22px; height: 22px; }
    .plan-card-title {
      font-size: 14px; font-weight: 800; color: #fff;
      margin-bottom: 4px; padding-right: 28px;
    }
    .plan-card-sub {
      font-size: 11px; color: var(--text-dim); margin-bottom: 10px;
      line-height: 1.4;
    }

    .plan-kcal-row {
      display: flex; align-items: center; gap: 6px;
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,.06);
      font-size: 11px; color: var(--text-dim);
    }
    .plan-kcal-row strong { color: var(--primary); font-size: 13px; }

    /* transição suave ao trocar de cardápio */
    .plan-content {
      transition: opacity .3s ease, transform .3s ease;
    }
    .plan-content.switching {
      opacity: 0; transform: translateY(10px);
    }

    /* ─── restante igual ao original ─── */
    .patient-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px 28px;
      margin-bottom: 32px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 20px;
      align-items: center;
      animation: fadeUp .5s ease both;
    }
    .patient-avatar {
      width: 68px; height: 68px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 800; color: #0D332D;
      flex-shrink: 0;
      box-shadow: 0 4px 20px rgba(16,185,129,.35);
    }
    .patient-info h2 { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .patient-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px; color: var(--text-dim); font-weight: 500;
    }
    .tag.green { background: rgba(16,185,129,.12); border-color: rgba(16,185,129,.25); color: var(--secondary); }
    .tag.yellow { background: rgba(251,191,36,.1); border-color: rgba(251,191,36,.25); color: var(--accent); }
    .tag.red { background: rgba(239,68,68,.1); border-color: rgba(239,68,68,.25); color: #f87171; }

    .cal-summary {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 32px;
      animation: fadeUp .5s .1s ease both;
    }
    .cal-day {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 8px;
      text-align: center;
      transition: border-color .2s, transform .2s;
      cursor: default;
    }
    .cal-day:hover { border-color: rgba(16,185,129,.45); transform: translateY(-2px); }
    .cal-day .day-name { font-size: 10px; color: var(--text-dim); font-weight: 600; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 8px; }
    .cal-day .cal-bar-wrap { height: 48px; display: flex; align-items: flex-end; justify-content: center; margin-bottom: 6px; }
    .cal-bar { width: 18px; border-radius: 4px 4px 0 0; background: linear-gradient(to top, var(--primary-dark), var(--secondary)); transition: height .8s cubic-bezier(.34,1.56,.64,1); }
    .cal-day .kcal { font-size: 11px; color: var(--primary); font-weight: 700; }

    .day-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
      animation: fadeUp .5s .15s ease both;
    }
    .nav-btn {
      width: 42px; height: 42px; border-radius: 50%;
      border: 2px solid rgba(16,185,129,.3);
      background: rgba(16,185,129,.1);
      color: var(--primary);
      font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, border-color .2s, transform .15s;
    }
    .nav-btn:hover { background: rgba(16,185,129,.22); border-color: rgba(16,185,129,.55); transform: scale(1.08); }
    .nav-btn:disabled { opacity: .3; cursor: not-allowed; transform: none; }
    .day-label { text-align: center; }
    .day-label h3 { font-size: 20px; font-weight: 800; color: #fff; }
    .day-label span { font-size: 12px; color: var(--text-dim); }

    .meals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
      animation: fadeUp .45s .2s ease both;
    }
    .meal-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      transition: transform .2s, box-shadow .2s, border-color .2s;
    }
    .meal-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,.3); border-color: rgba(16,185,129,.35); }
    .meal-header {
      padding: 14px 18px 10px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .meal-icon {
      width: 38px; height: 38px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .meal-icon svg { width: 18px; height: 18px; }
    .icon-cafe svg    { stroke: #fbbf24; }
    .icon-lanche svg  { stroke: #34d399; }
    .icon-almoco svg  { stroke: #f87171; }
    .icon-jantar svg  { stroke: #a78bfa; }
    .icon-ceia svg    { stroke: #94a3b8; }
    .meal-title { font-size: 14px; font-weight: 700; color: #fff; }
    .meal-time { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
    .meal-kcal {
      margin-left: auto; font-size: 12px; font-weight: 700;
      color: var(--primary);
      background: rgba(16,185,129,.12);
      border-radius: 10px; padding: 3px 9px;
      white-space: nowrap;
    }
    .meal-body { padding: 12px 18px 16px; }
    .meal-body ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .meal-body li {
      font-size: 13px; color: var(--text); line-height: 1.4;
      padding-left: 14px; position: relative;
    }
    .meal-body li::before {
      content: ''; position: absolute; left: 0; top: 7px;
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--primary);
    }
    .meal-body li.tempero {
      color: #d97706;
      font-style: italic;
      font-size: 12px;
    }
    .meal-body li.tempero::before { background: #d97706; }

    .supps-card {
      background: var(--card-bg);
      border: 1px solid rgba(59,130,246,.2);
      border-radius: 18px;
      padding: 22px 24px;
      margin-top: 32px;
      animation: fadeUp .5s .25s ease both;
    }
    .supps-card h3 { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .supp-list { display: flex; flex-direction: column; gap: 10px; }
    .supp-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 14px;
      background: rgba(59,130,246,.07);
      border: 1px solid rgba(59,130,246,.15);
      border-radius: 12px;
      font-size: 13px; color: var(--text); line-height: 1.4;
    }
    .supp-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blue); flex-shrink: 0; margin-top: 4px; }

    .icon-cafe    { background: rgba(251,191,36,.15); }
    .icon-lanche  { background: rgba(16,185,129,.13); }
    .icon-almoco  { background: rgba(239,68,68,.12); }
    .icon-jantar  { background: rgba(99,102,241,.14); }
    .icon-ceia    { background: rgba(148,163,184,.1); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 640px) {
      .cal-summary { grid-template-columns: repeat(4, 1fr); }
      .meals-grid { grid-template-columns: 1fr; }
      .patient-card { grid-template-columns: 1fr; text-align: center; }
      .patient-tags { justify-content: center; }
      .plan-cards-row { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 400px) {
      .cal-summary { grid-template-columns: repeat(3, 1fr); }
      .plan-cards-row { grid-template-columns: 1fr; }
    }
  </style>
</head>

    <div class="plan-selector-header">
      <h2>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>

<script>
const TODOS_CARDAPIOS = [
  {
    _id: 'plano-vegetariano',
    _titulo: 'Plano Vegetariano',
    _subtitulo: 'Foco em ganho de massa • sem lactose',
    _svg: `<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'><path d='M12 22V12'/><path d='M5 3s0 6 7 9'/><path d='M19 3s0 6-7 9'/><path d='M9 20h6'/></svg>`,
    name:"Thais Casagrande",gender:"feminino",age:34,height:1.55,weight:80,
    objective:"ganhar massa",imc:23,alergia:"lactose",trabalho:"professor",
    esporte:"Nenhum",dietaAtual:"vegetariana",
    refeicoes:[{nome:"Segunda",refeicoes:[{horario:"07:00",nome:"Cafe da manha",alimentos:["1 copo (250ml) de leite de amendoas","3 colheres de sopa de aveia em flocos","1 unidade de banana em rodelas","1 colher de sopa de sementes de chia","tempero: canela em po"],calorias:420},{horario:"10:00",nome:"Lanche da manha",alimentos:["1 unidade de maca","5 unidades de castanha do para","tempero: sem sal"],calorias:220},{horario:"13:00",nome:"Almoco",alimentos:["150g de arroz integral","100g de feijao preto","120g de proteina de soja texturizada refogada","1 prato de salada de folhas verdes com tomate e pepino","1 colher de sopa de azeite de oliva extra virgem","tempero: alho, cebola, pimenta do reino, salsinha"],calorias:650},{horario:"16:00",nome:"Lanche da tarde",alimentos:["1 unidade de iogurte vegetal","30g de granola sem acucar","tempero: canela em po"],calorias:280},{horario:"19:00",nome:"Jantar",alimentos:["150g de batata doce cozida","150g de tofu grelhado com legumes","1 colher de sopa de azeite de oliva extra virgem","tempero: gengibre ralado, shoyu light, alho, cebolinha"],calorias:580},{horario:"21:30",nome:"Ceia",alimentos:["1 xicara (200ml) de cha de camomila","1 porcao (30g) de pasta de amendoim integral","tempero: sem sal"],calorias:180}]}],
    suplementos:{suplementos_gerais:["Proteina vegetal em po","Creatina","Multivitaminico","Omega 3","Vitamina D"]},
    grafico:[{dia:"Segunda",caloriasTotais:2330},{dia:"Terca",caloriasTotais:2250},{dia:"Quarta",caloriasTotais:2300},{dia:"Quinta",caloriasTotais:2260},{dia:"Sexta",caloriasTotais:2430},{dia:"Sabado",caloriasTotais:2460},{dia:"Domingo",caloriasTotais:2430}]
  }
];
 
let activePlanIndex = 0;
let currentDay = 0;
let usuarioLogado = null;
let modoUsuario = false;
let cardapiosBanco = [];
let cardapioBancoAtivo = 0;
 
// ═══════════════════════════════════════════════════════
// MENSAGEM FLUTUANTE
// ═══════════════════════════════════════════════════════
function mostrarMensagem(texto, tipo = "sucesso") {
  const div = document.getElementById("mensagem-flutuante");
  if (!div) return;
  div.textContent = texto;
  div.className = `mensagem visivel ${tipo}`;
  setTimeout(() => { div.classList.add("ocultar"); }, 2500);
  setTimeout(() => { div.className = "mensagem"; }, 3000);
}
 
function getUsuarioSessao() {
  const user = sessionStorage.getItem("usuario") || localStorage.getItem("dadosUsuario");
  if (!user) return null;
  return JSON.parse(user);
}
 
// ═══════════════════════════════════════════════════════
// SELETOR — só mostra cardápios do banco OU estáticos, nunca os dois
// ═══════════════════════════════════════════════════════
function renderPlanSelector() {
  const row = document.getElementById('planCardsRow');
  row.innerHTML = '';
 
  if (cardapiosBanco.length > 0) {
    document.getElementById('planCountBadge').textContent =
      `${cardapiosBanco.length} plano${cardapiosBanco.length > 1 ? 's' : ''} disponível${cardapiosBanco.length > 1 ? 'is' : ''}`;
 
    cardapiosBanco.forEach((c, i) => {
      const cardapioData = typeof c.cardapio_texto === 'string'
        ? JSON.parse(c.cardapio_texto) : c.cardapio_texto;
 
      const grafico = cardapioData.grafico || [];
      const totalCal = grafico.reduce((s, d) => s + (d.caloriasTotais || 0), 0);
      const mediaCal = grafico.length ? Math.round(totalCal / grafico.length) : 0;
      const titulo = c.nome_cardapio || cardapioData.nome_cardapio || `Meu Plano ${i + 1}`;
      const data = c.criado_em ? new Date(c.criado_em).toLocaleDateString('pt-BR') : '';
      const isActive = modoUsuario && i === cardapioBancoAtivo;
 
      const div = document.createElement('div');
      div.className = 'plan-card' + (isActive ? ' active' : '');
      div.onclick = () => selecionarCardapioBanco(i);
      div.innerHTML = `
        <div class="plan-check"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#0a1f1a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        <span class="plan-emoji"><svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'><path d='M12 2a10 10 0 100 20A10 10 0 0012 2z'/><path d='M12 8v4l3 3'/></svg></span>
        <div class="plan-card-title">${titulo}</div>
        <div class="plan-card-sub">Seu plano personalizado${data ? ` • ${data}` : ''}</div>
        <div class="plan-kcal-row">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 6v6l4 2"/></svg>
          Média diária: <strong>${mediaCal ? mediaCal + ' kcal' : 'N/A'}</strong>
        </div>`;
      row.appendChild(div);
    });
 
  } else {
    document.getElementById('planCountBadge').textContent = `${TODOS_CARDAPIOS.length} planos de exemplo`;
 
    TODOS_CARDAPIOS.forEach((plano, i) => {
      const totalCal = plano.grafico.reduce((s, d) => s + d.caloriasTotais, 0);
      const mediaCal = Math.round(totalCal / plano.grafico.length);
      const isActive = !modoUsuario && i === activePlanIndex;
 
      const div = document.createElement('div');
      div.className = 'plan-card' + (isActive ? ' active' : '');
      div.onclick = () => selectPlan(i);
      div.innerHTML = `
        <div class="plan-check"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#0a1f1a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        <span class="plan-emoji">${plano._svg}</span>
        <div class="plan-card-title">${plano._titulo}</div>
        <div class="plan-card-sub">${plano._subtitulo}</div>
        <div class="plan-kcal-row">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 6v6l4 2"/></svg>
          Média diária: <strong>${mediaCal} kcal</strong>
        </div>`;
      row.appendChild(div);
    });
  }
}
 
function selecionarCardapioBanco(i) {
  cardapioBancoAtivo = i;
  currentDay = 0;
  modoUsuario = true;
 
  const c = cardapiosBanco[i];
  const cardapioData = typeof c.cardapio_texto === 'string'
    ? JSON.parse(c.cardapio_texto) : c.cardapio_texto;
 
  usuarioLogado = {
    ...usuarioLogado,
    name:               cardapioData.name        || usuarioLogado?.name,
    age:                cardapioData.age         || usuarioLogado?.age,
    height:             cardapioData.height      || usuarioLogado?.height,
    weight:             cardapioData.weight      || usuarioLogado?.weight,
    objective:          cardapioData.objective   || usuarioLogado?.objective,
    dietaAtual:         cardapioData.dietaAtual  || usuarioLogado?.dietaAtual,
    trabalho:           cardapioData.trabalho    || usuarioLogado?.trabalho,
    alergia:            cardapioData.alergia     || usuarioLogado?.alergia,
    esporte:            cardapioData.esporte     || usuarioLogado?.esporte,
    alimentosFavoritos: JSON.stringify(cardapioData.alimentosFavoritos || []),
    refeicoes:          cardapioData.refeicoes   || [],
    grafico:            cardapioData.grafico     || [],
    suplementos:        cardapioData.suplementos || {},
    nome_cardapio:      c.nome_cardapio || cardapioData.nome_cardapio || `Meu Plano ${i + 1}`
  };
 
  const content = document.getElementById('planContent');
  content.classList.add('switching');
  setTimeout(() => {
    renderPatient();
    renderCalBars();
    renderDayFromBanco();
    renderSupps();
    content.classList.remove('switching');
  }, 300);
 
  renderPlanSelector();
}
 
function selectPlan(i) {
  activePlanIndex = i;
  currentDay = 0;
  modoUsuario = false;
  const content = document.getElementById('planContent');
  content.classList.add('switching');
  setTimeout(() => { renderAllContent(); content.classList.remove('switching'); }, 300);
  renderPlanSelector();
}
 
const MEAL_SVGS = {
  cafe:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8h1a4 4 0 010 8h-1"/><path d="M3 8h14v9a4 4 0 01-4 4H7a4 4 0 01-4-4V8z"/><line x1="6" y1="2" x2="6" y2="5"/><line x1="10" y1="2" x2="10" y2="5"/></svg>`,
  lanche: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>`,
  almoco: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>`,
  jantar: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 009 9 9 9 0 11-9-9z"/></svg>`,
  ceia:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 009 9 9 9 0 11-9-9z"/><circle cx="12" cy="12" r="3"/></svg>`,
};
 
function getMealMeta(nome) {
  const n = nome.toLowerCase();
  if (n.includes('cafe'))   return { svg: MEAL_SVGS.cafe,   cls: 'icon-cafe' };
  if (n.includes('almoco')) return { svg: MEAL_SVGS.almoco, cls: 'icon-almoco' };
  if (n.includes('jantar')) return { svg: MEAL_SVGS.jantar, cls: 'icon-jantar' };
  if (n.includes('ceia'))   return { svg: MEAL_SVGS.ceia,   cls: 'icon-ceia' };
  return { svg: MEAL_SVGS.lanche, cls: 'icon-lanche' };
}
 
function renderPatient() {
  if (usuarioLogado && modoUsuario) {
    const u = usuarioLogado;
    const initials = u.name ? u.name.split(' ').map(w => w[0]).slice(0, 2).join('') : '??';
    let favoritos = [];
    try { favoritos = u.alimentosFavoritos ? JSON.parse(u.alimentosFavoritos) : []; } catch(e) {}
    document.getElementById('patientCard').innerHTML = `
      <div class="patient-avatar">${initials}</div>
      <div class="patient-info">
        <h2>${u.name || "Sem nome"}</h2>
        ${u.nome_cardapio ? `<div style="font-size:13px;opacity:.7;margin-bottom:6px">${u.nome_cardapio}</div>` : ''}
        <div class="patient-tags">
          <span class="tag">${u.age || "--"} anos</span>
          <span class="tag">${u.height || "--"}m · ${u.weight || "--"}kg</span>
          ${u.dietaAtual && u.dietaAtual !== 'Nenhuma' ? `<span class="tag yellow">${u.dietaAtual}</span>` : ''}
          ${u.objective ? `<span class="tag green">${u.objective}</span>` : ''}
          ${u.trabalho ? `<span class="tag blue">${u.trabalho}</span>` : ''}
          ${u.alergia && u.alergia !== 'Nenhuma' && u.alergia !== 'nenhuma' ? `<span class="tag red">${u.alergia}</span>` : ''}
          ${favoritos.map(f => `<span class="tag green">${f}</span>`).join('')}
        </div>
      </div>`;
    return;
  }
  const c = TODOS_CARDAPIOS[activePlanIndex];
  const initials = c.name.split(' ').map(w => w[0]).slice(0, 2).join('');
  document.getElementById('patientCard').innerHTML = `
    <div class="patient-avatar">${initials}</div>
    <div class="patient-info">
      <h2>${c.name}</h2>
      <div class="patient-tags">
        <span class="tag">${c.age} anos</span>
        <span class="tag">${c.height}m · ${c.weight}kg</span>
        <span class="tag green">${c.objective}</span>
        <span class="tag yellow">${c.dietaAtual}</span>
        ${c.alergia && c.alergia !== 'nenhuma' ? `<span class="tag red">${c.alergia}</span>` : ''}
        <span class="tag">${c.trabalho}</span>
      </div>
    </div>`;
}
 
function renderCalBars() {
  const grafico = (modoUsuario && usuarioLogado?.grafico)
    ? usuarioLogado.grafico : TODOS_CARDAPIOS[activePlanIndex].grafico;
  const maxCal = Math.max(...grafico.map(d => d.caloriasTotais));
  const container = document.getElementById('calSummary');
  container.innerHTML = '';
  const shortNames = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  grafico.forEach((d, i) => {
    const pct = Math.round((d.caloriasTotais / maxCal) * 48);
    container.innerHTML += `
      <div class="cal-day" onclick="goToDay(${i})" title="${d.dia}: ${d.caloriasTotais} kcal" style="cursor:pointer">
        <div class="day-name">${shortNames[i]}</div>
        <div class="cal-bar-wrap"><div class="cal-bar" style="height:${pct}px"></div></div>
        <div class="kcal">${(d.caloriasTotais/1000).toFixed(2)}k</div>
      </div>`;
  });
}
 
const diasSemana = ['Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado','Domingo'];
 
function buildMealGrid(refeicoes, grid) {
  grid.innerHTML = '';
  refeicoes.forEach(ref => {
    const { svg, cls } = getMealMeta(ref.nome);
    const items = ref.alimentos.map(a => {
      if (a.toLowerCase().startsWith('tempero:'))
        return `<li class="tempero"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:3px"><path d="M12 22V12"/><path d="M5 3s0 6 7 9"/><path d="M19 3s0 6-7 9"/></svg>${a}</li>`;
      return `<li>${a}</li>`;
    }).join('');
    grid.innerHTML += `
      <div class="meal-card">
        <div class="meal-header">
          <div class="meal-icon ${cls}">${svg}</div>
          <div><div class="meal-title">${ref.nome}</div>
          <div class="meal-time"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:3px"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${ref.horario || '--'}</div></div>
          <div class="meal-kcal">${ref.calorias || 0} kcal</div>
        </div>
        <div class="meal-body"><ul>${items}</ul></div>
      </div>`;
  });
}
 
function renderDay() {
  const c = TODOS_CARDAPIOS[activePlanIndex];
  const dia = c.refeicoes[currentDay];
  const kcal = c.grafico[currentDay].caloriasTotais;
  document.getElementById('dayTitle').textContent = diasSemana[currentDay];
  document.getElementById('dayKcal').textContent = `${kcal} kcal no dia`;
  document.getElementById('prevBtn').disabled = currentDay === 0;
  document.getElementById('nextBtn').disabled = currentDay === c.refeicoes.length - 1;
  const grid = document.getElementById('mealsGrid');
  grid.style.opacity = '0'; grid.style.transform = 'translateY(12px)';
  setTimeout(() => {
    buildMealGrid(dia.refeicoes, grid);
    grid.style.transition = 'opacity .35s ease, transform .35s ease';
    grid.style.opacity = '1'; grid.style.transform = 'translateY(0)';
  }, 120);
}
 
function renderDayFromBanco() {
  const refeicoes = usuarioLogado?.refeicoes || [];
  if (!refeicoes.length) return;
  const dia = refeicoes[currentDay] || refeicoes[0];
  const grafico = usuarioLogado?.grafico || [];
  const kcal = grafico[currentDay]?.caloriasTotais || 0;
  document.getElementById('dayTitle').textContent = dia.nome || diasSemana[currentDay];
  document.getElementById('dayKcal').textContent = kcal ? `${kcal} kcal no dia` : '';
  document.getElementById('prevBtn').disabled = currentDay === 0;
  document.getElementById('nextBtn').disabled = currentDay === refeicoes.length - 1;
  const grid = document.getElementById('mealsGrid');
  grid.style.opacity = '0'; grid.style.transform = 'translateY(12px)';
  setTimeout(() => {
    buildMealGrid(dia.refeicoes, grid);
    grid.style.transition = 'opacity .35s ease, transform .35s ease';
    grid.style.opacity = '1'; grid.style.transform = 'translateY(0)';
  }, 120);
}
 
function changeDay(dir) {
  const refeicoes = modoUsuario
    ? (usuarioLogado?.refeicoes || [])
    : TODOS_CARDAPIOS[activePlanIndex].refeicoes;
  const next = currentDay + dir;
  if (next < 0 || next >= refeicoes.length) return;
  currentDay = next;
  modoUsuario ? renderDayFromBanco() : renderDay();
}
 
function goToDay(i) {
  currentDay = i;
  modoUsuario ? renderDayFromBanco() : renderDay();
  document.getElementById('mealsGrid').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
 
function renderSupps() {
  let gerais = [];
  if (modoUsuario && usuarioLogado?.suplementos) {
    const s = usuarioLogado.suplementos;
    const todas = [
      ...(s.suplementos_gerais || []),
      ...(s.suplementos_antes_treino_esporte || []),
      ...(s.suplementos_antes_treino_academia || [])
    ];
    gerais = todas.map(item =>
      typeof item === 'string' ? item : `${item.nome} — ${item.quantidade} (${item.horario})`
    );
  } else {
    gerais = TODOS_CARDAPIOS[activePlanIndex].suplementos?.suplementos_gerais || [];
  }
  const card = document.getElementById('suppsCard');
  const list = document.getElementById('suppList');
  if (!gerais.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  list.innerHTML = gerais.map(s => `<div class="supp-item"><div class="supp-dot"></div><span>${s}</span></div>`).join('');
}
 
function renderAllContent() {
  modoUsuario = false;
  renderPatient();
  renderCalBars();
  renderDay();
  renderSupps();
}
 
async function carregarUsuario() {
  try {
    const usuario = getUsuarioSessao();
    if (!usuario) return false;
    const res = await fetch(`http://localhost:3000/respostas/usuario/${usuario.id}`);
    const data = await res.json();
    if (!data.respostas || data.respostas.length === 0) return false;
    usuarioLogado = data.respostas[0];
    return true;
  } catch (err) { console.error("Erro ao carregar usuário:", err); return false; }
}
 
async function carregarTodosCardapiosDoBanco(usuarioId) {
  try {
    const res = await fetch(`http://localhost:3000/salvarCardapio/usuario/${usuarioId}/todos`);
    if (!res.ok) throw new Error("Erro ao buscar cardápios");
    const data = await res.json();
    if (!Array.isArray(data) || data.length === 0) return false;
 
    cardapiosBanco = data;
    const primeiro = data[0];
    const cardapioData = typeof primeiro.cardapio_texto === 'string'
      ? JSON.parse(primeiro.cardapio_texto) : primeiro.cardapio_texto;
 
    usuarioLogado = {
      ...usuarioLogado,
      name:               cardapioData.name        || usuarioLogado?.name,
      age:                cardapioData.age         || usuarioLogado?.age,
      height:             cardapioData.height      || usuarioLogado?.height,
      weight:             cardapioData.weight      || usuarioLogado?.weight,
      objective:          cardapioData.objective   || usuarioLogado?.objective,
      dietaAtual:         cardapioData.dietaAtual  || usuarioLogado?.dietaAtual,
      trabalho:           cardapioData.trabalho    || usuarioLogado?.trabalho,
      alergia:            cardapioData.alergia     || usuarioLogado?.alergia,
      esporte:            cardapioData.esporte     || usuarioLogado?.esporte,
      alimentosFavoritos: JSON.stringify(cardapioData.alimentosFavoritos || []),
      refeicoes:          cardapioData.refeicoes   || [],
      grafico:            cardapioData.grafico     || [],
      suplementos:        cardapioData.suplementos || {},
      nome_cardapio:      primeiro.nome_cardapio || cardapioData.nome_cardapio || 'Meu Plano'
    };
    return true;
  } catch (err) { console.error("Erro ao carregar cardápios:", err); return false; }
}
 
// ═══════════════════════════════════════════════════════
// ÚNICO DOMContentLoaded — com bloqueio de acesso
// ═══════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  const usuario = getUsuarioSessao();
 
  // 1. Bloqueia se não estiver logado
  if (!usuario) {
    mostrarMensagem("Você precisa estar logado para acessar esta página.", "erro");
    setTimeout(() => { window.location.href = "entrar.html"; }, 2500);
    return;
  }
 
  const usuarioOk   = await carregarUsuario();
  const cardapiosOk = usuarioOk ? await carregarTodosCardapiosDoBanco(usuario.id) : false;
 
  // 2. Bloqueia se não tiver nenhum cardápio gerado
  if (!cardapiosOk || cardapiosBanco.length === 0) {
    mostrarMensagem("Você ainda não gerou nenhum cardápio. Crie um primeiro!", "erro");
    setTimeout(() => { window.location.href = "Cardapio.html"; }, 2500);
    return;
  }
 
  // 3. Tudo ok — libera a página
  modoUsuario = true;
  cardapioBancoAtivo = 0;
  renderPlanSelector();
  renderPatient();
  renderCalBars();
  renderDayFromBanco();
  renderSupps();
 
  setTimeout(() => {
    document.querySelectorAll('.cal-bar').forEach(bar => {
      bar.style.transition = 'height .8s cubic-bezier(.34,1.56,.64,1)';
    });
  }, 100);
});
</script>

<div id="mensagem-flutuante" class="mensagem"></div>

</body>
